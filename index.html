<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drowys</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050508;
  --surface: rgba(255,255,255,0.03);
  --surface2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --accent: #7c6fff;
  --accent2: #ff6fff;
  --text: #e8e4f0;
  --muted: #6b6580;
  --online: #23d18b;
  --idle: #f0b232;
  --dnd: #ed4245;
  --offline: #80848e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
}

.card {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 14px;
  box-shadow: 0 6px 30px rgba(2,6,23,0.6);
  transition: transform 0.32s cubic-bezier(.17,.67,.35,1.4), box-shadow 0.32s ease, border-color 0.32s ease;
  transform-style: preserve-3d;
  position: relative;
  overflow: visible;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(124,111,255,0.03) 0%, transparent 60%);
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 0;
}
.card::after {
  content: '';
  position: absolute; inset: -2px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(124,111,255,0), rgba(255,111,255,0));
  transition: background 0.32s ease, box-shadow 0.32s ease;
  pointer-events: none;
  z-index: -1;
}
.card:hover {
  border-color: rgba(124,111,255,0.35);
  box-shadow:
    0 24px 60px rgba(2,6,23,0.75),
    0 0 0 1px rgba(124,111,255,0.15) inset,
    0 0 40px rgba(124,111,255,0.12),
    0 0 80px rgba(124,111,255,0.06);
}
.card:hover::before {
  opacity: 3;
  background: linear-gradient(135deg, rgba(124,111,255,0.08) 0%, rgba(255,111,255,0.04) 60%);
}
.card:hover::after {
  box-shadow: 0 0 60px rgba(124,111,255,0.18), 0 0 120px rgba(255,111,255,0.08);
}

@keyframes cardPop {
  0%   { transform: translateY(-10px) scale(1.045); }
  40%  { transform: translateY(-13px) scale(1.065); }
  70%  { transform: translateY(-9px) scale(1.038); }
  100% { transform: translateY(-10px) scale(1.045); }
}
.card.popping {
  animation: cardPop 0.35s cubic-bezier(.17,.67,.35,1.4) forwards;
}

@keyframes rippleOut {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.5; }
  100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
}
.card-ripple {
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 1.5px solid rgba(124,111,255,0.5);
  pointer-events: none;
  animation: rippleOut 0.7s ease-out forwards;
  z-index: 10;
}

#cursor {
  position: fixed; top: 0; left: 0;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.15s, height 0.15s, background 0.15s;
}

body:has(a:hover) #cursor,
body:has(button:hover) #cursor {
  width: 12px; height: 12px;
  background: var(--accent2);
}

#cursor-ring {
  position: fixed; top: 0; left: 0;
  width: 38px; height: 38px;
  border: 1.5px solid rgba(124,111,255,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s;
}

body:has(a:hover) #cursor-ring,
body:has(button:hover) #cursor-ring {
  width: 56px; height: 56px;
  border-color: var(--accent2);
}

#bg-canvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

#splash {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  cursor: none;
  transition: opacity 0.8s ease, visibility 0.8s;
}

#splash.hidden { opacity: 0; visibility: hidden; }

.splash-text {
  font-size: clamp(1rem, 3vw, 1.4rem);
  letter-spacing: 0.3em;
  color: var(--muted);
  animation: pulse 2s ease-in-out infinite;
}

.splash-text span { color: var(--accent); }

@keyframes pulse {
  0%,100% { opacity: 0.5; } 50% { opacity: 1; }
}

#main {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
  opacity: 0;
  transition: opacity 1s ease 0.3s;
}

#main.visible { opacity: 1; }

.profile-wrap {
  width: 100%; max-width: 440px;
  display: flex; flex-direction: column; gap: 14px;
}

.profile-card { padding: 28px 24px 22px; }

.avatar-row {
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 18px;
}

.avatar-wrap {
  position: relative; flex-shrink: 0;
  width: 74px; height: 74px;
}

.avatar {
  width: 74px; height: 74px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; overflow: hidden; border: 2px solid rgba(255,255,255,0.04);
}

.avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  filter: brightness(1.15) contrast(1.05);
  border-radius: 50%;
  display: block;
}

.avatar svg { width: 100%; height: 100%; display: block; }

.avatar-ring {
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 3px solid transparent;
  background: linear-gradient(var(--bg), var(--bg)) padding-box,
              linear-gradient(135deg, rgba(124,111,255,0.18), rgba(255,111,255,0.12)) border-box;
  animation: spin 6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.profile-info { flex: 1; }

.profile-name {
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, #fff 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.profile-tag {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted); margin-top: 2px;
  letter-spacing: 0.08em;
}

.bio {
  font-size: 0.82rem; color: var(--muted);
  line-height: 1.6; margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.bio strong { color: var(--text); }

.meta-row {
  display: flex; gap: 16px; flex-wrap: wrap;
}

.meta-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: var(--muted);
  font-family: 'Space Mono', monospace;
}

.meta-dot { width: 6px; height: 6px; border-radius: 50%; }

.stats-card { padding: 16px 20px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.stat-box {
  text-align: center; padding: 12px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: border-color 0.2s, transform 0.2s;
}

.stat-box:hover { transform: translateY(-4px); border-color: rgba(124,111,255,0.12); }

.stat-val {
  font-size: 1.3rem; font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  font-family: 'Space Mono', monospace;
}

.stat-key {
  font-size: 0.6rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-top: 3px; font-family: 'Space Mono', monospace;
}

.discord-card { padding: 20px 22px; }

.discord-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}

.discord-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); font-family: 'Space Mono', monospace;
}

.discord-logo { width: 14px; height: 14px; fill: #5865F2; opacity: 0.8; }

.discord-live {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.58rem; color: var(--online);
  font-family: 'Space Mono', monospace; letter-spacing: 0.1em;
  background: rgba(35,209,139,0.08);
  border: 1px solid rgba(35,209,139,0.2);
  border-radius: 99px; padding: 3px 9px;
}

.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--online);
  animation: blink 1.5s ease infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}

.discord-user {
  display: flex; align-items: center; gap: 14px;
  padding: 2px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}

.discord-avatar-wrap { position: relative; flex-shrink: 0; }

.discord-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  overflow: hidden;
  background: linear-gradient(135deg, #5865F2, #7289da);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
}

.discord-avatar img { width: 100%; height: 100%; object-fit: cover; }

.status-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--offline);
  border: 2.5px solid var(--bg);
  transition: background 0.4s;
}

.status-dot.online { background: var(--online); }
.status-dot.idle { background: var(--idle); }
.status-dot.dnd { background: var(--dnd); }

.discord-details { flex: 1; min-width: 0; }

.discord-name {
  font-size: 1rem; font-weight: 800;
  letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}

.discord-handle {
  font-size: 0.65rem; color: var(--muted);
  font-family: 'Space Mono', monospace;
  margin-top: 1px;
}

.discord-status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px;
  font-size: 0.65rem; font-family: 'Space Mono', monospace;
  padding: 3px 9px; border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
}

.discord-status-pill.online { color: var(--online); border-color: rgba(35,209,139,0.2); background: rgba(35,209,139,0.07); }
.discord-status-pill.idle { color: var(--idle); border-color: rgba(240,178,50,0.2); background: rgba(240,178,50,0.07); }
.discord-status-pill.dnd { color: var(--dnd); border-color: rgba(237,66,69,0.2); background: rgba(237,66,69,0.07); }

.discord-activity {
  display: flex; gap: 11px; align-items: flex-start;
  padding: 11px 13px;
  background: rgba(88,101,242,0.06);
  border: 1px solid rgba(88,101,242,0.12);
  border-radius: 12px;
}

.activity-icon {
  font-size: 1.4rem; flex-shrink: 0; line-height: 1;
  margin-top: 1px;
}

.activity-body { flex: 1; min-width: 0; }

.activity-label {
  font-size: 0.58rem; text-transform: uppercase;
  letter-spacing: 0.14em; color: #5865F2;
  font-family: 'Space Mono', monospace; margin-bottom: 3px;
}

.activity-name {
  font-size: 0.82rem; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.activity-detail {
  font-size: 0.65rem; color: var(--muted);
  font-family: 'Space Mono', monospace; margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.discord-fallback {
  text-align: center; padding: 6px 0 2px;
  font-size: 0.68rem; color: var(--muted);
  font-family: 'Space Mono', monospace; line-height: 1.7;
}

.discord-fallback a { color: var(--accent); text-decoration: none; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}

.views-badge {
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; color: var(--muted);
  letter-spacing: 0.08em; padding: 4px 0 2px;
}

.views-badge span { color: var(--accent); font-weight: 700; }

.glow-orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none;
  z-index: 0; opacity: 0.18;
}

.orb1 {
  width: 400px; height: 400px;
  background: var(--accent);
  top: -100px; left: -100px;
  animation: drift 8s ease-in-out infinite;
}

.orb2 {
  width: 300px; height: 300px;
  background: var(--accent2);
  bottom: -80px; right: -80px;
  animation: drift 8s ease-in-out infinite;
  animation-delay: -4s;
}

@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(40px,30px) scale(1.08); }
  66% { transform: translate(-20px,20px) scale(0.95); }
}

body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 2;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}

.card { animation: slideUp 0.6s cubic-bezier(.22,1,.36,1) both; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.19s; }

.music-bars {
  display: inline-flex; align-items: flex-end;
  gap: 2px; height: 12px; margin-left: 4px;
  vertical-align: middle;
}

.bar {
  width: 2.5px; background: var(--accent);
  border-radius: 1px;
  animation: musicAnim 0.9s ease-in-out infinite;
}

.bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.bar:nth-child(3) { height: 5px; animation-delay: 0.3s; }
.bar:nth-child(4) { height: 10px; animation-delay: 0.1s; }

@keyframes musicAnim {
  0%,100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1); }
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bg-canvas"></canvas>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div id="splash">
  <p class="splash-text">click to enter<span>.</span></p>
</div>

<div id="main">
  <div class="profile-wrap">

    <div class="card profile-card">
      <div class="avatar-row">
        <div class="avatar-wrap">
            <div class="avatar" id="profile-avatar">
              <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="av-grad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#ff7a18"/>
                    <stop offset="50%" stop-color="#d44aff"/>
                    <stop offset="100%" stop-color="#7c6fff"/>
                  </linearGradient>
                  <radialGradient id="av-shine" cx="35%" cy="30%" r="55%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                  </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="50" fill="url(#av-grad)"/>
                <circle cx="50" cy="50" r="50" fill="url(#av-shine)"/>
                
                <circle cx="30" cy="65" r="22" fill="rgba(255,255,255,0.06)"/>
                <circle cx="72" cy="35" r="18" fill="rgba(255,255,255,0.05)"/>
                <rect x="38" y="20" width="30" height="30" rx="8"
                      fill="rgba(255,255,255,0.07)" transform="rotate(20 53 35)"/>
              </svg>
            </div>
          <div class="avatar-ring"></div>
        </div>
        <div class="profile-info">
          <div class="profile-name">Drowys</div>
          <div class="profile-tag">developer · Hungary</div>
        </div>
      </div>
      <div class="bio">
        <strong>Building things on the internet.</strong> I write code, manage projects, and occasionally sleep. Somewhere between backend logic and late-night sessions.
        <span class="music-bars">
          <span class="bar"></span><span class="bar"></span>
          <span class="bar"></span><span class="bar"></span>
        </span>
      </div>
      <div class="meta-row">
        <div class="meta-item">
          <div class="meta-dot" style="background:var(--accent2)"></div>
          <span>Hungary</span>
        </div>
        <div class="meta-item">
          <div class="meta-dot" style="background:var(--accent)"></div>
          <span>Active 2022 —</span>
        </div>
      </div>
    </div>

    <div class="card stats-card">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val" id="cnt-projects">0</div>
          <div class="stat-key">Projects</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="cnt-views">0</div>
          <div class="stat-key">Views</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="cnt-years">0</div>
          <div class="stat-key">Yrs coding</div>
        </div>
      </div>
    </div>

    <div class="card discord-card">
      <div class="discord-header">
        <div class="discord-title">
          <svg class="discord-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
          Discord
        </div>
        <div class="discord-live" id="discord-live-badge" style="display:none">
          <div class="live-dot"></div> LIVE
        </div>
      </div>
      <div id="discord-content">
        <div style="text-align:center;padding:10px 0;font-size:0.72rem;color:var(--muted);font-family:'Space Mono',monospace">
          <span class="spinner"></span>Fetching status…
        </div>
      </div>
    </div>

    <div class="views-badge"><span id="view-count">0</span> profile views</div>

  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

(function animRing() {
  rx += (mx - rx) * 0.14;
  ry += (my - ry) * 0.14;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
})();

const splash = document.getElementById('splash');
const main = document.getElementById('main');

splash.addEventListener('click', () => {
  splash.classList.add('hidden');
  main.classList.add('visible');
  startCounters();
  fetchDiscord();
});

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
const particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 90; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    r: Math.random() * 1.5 + 0.3,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    a: Math.random() * 0.5 + 0.1,
    color: Math.random() > 0.5 ? '124,111,255' : '255,111,255'
  });
}

(function animCanvas() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.a})`;
    ctx.fill();
  });
  requestAnimationFrame(animCanvas);
})();

document.querySelectorAll('.card').forEach(card => {
  let isHovered = false;

  card.addEventListener('mouseenter', e => {
    isHovered = true;

    const rect = card.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'card-ripple';
    ripple.style.left = (e.clientX - rect.left) + 'px';
    ripple.style.top  = (e.clientY - rect.top)  + 'px';
    card.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);

    const colors = ['#7c6fff','#ff6fff','#a78bfa','#f0b2ff'];
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div');
      const angle = (i / 14) * Math.PI * 2;
      const dist  = 55 + Math.random() * 55;
      const size  = Math.random() * 5 + 2;
      const cx = e.clientX, cy = e.clientY;
      p.style.cssText = `
        position:fixed;
        left:${cx}px; top:${cy}px;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:50%;
        pointer-events:none; z-index:9995;
        transform:translate(-50%,-50%) scale(1);
        opacity:1;
        transition:transform 0.5s cubic-bezier(.2,.8,.4,1), opacity 0.5s ease;
      `;
      document.body.appendChild(p);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        p.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`;
        p.style.opacity = '0';
      }));
      setTimeout(() => p.remove(), 550);
    }
  });

  card.addEventListener('mouseleave', () => {
    isHovered = false;
    card.style.transform = 'perspective(700px) rotateY(0deg) rotateX(0deg) translateY(0px) scale(1)';
    setTimeout(() => {
      if (!isHovered) card.style.transform = '';
    }, 320);
  });

  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const dx = (e.clientX - rect.left - rect.width / 2) / (rect.width / 2);
    const dy = (e.clientY - rect.top - rect.height / 2) / (rect.height / 2);
    card.style.transform = `perspective(700px) rotateY(${dx * 6}deg) rotateX(${-dy * 6}deg) translateY(-10px) scale(1.045)`;
  });
});

function animCount(el, target, duration) {
  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const progress = Math.min((ts - start) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(ease * target);
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

function startCounters() {
  animCount(document.getElementById('cnt-projects'), 12, 1400);
  animCount(document.getElementById('cnt-views'), 59, 1400);
  animCount(document.getElementById('cnt-years'), 3, 1400);

}

const DISCORD_ID = '963444215973560320';

function statusClass(s) {
  if (s === 'online') return 'online';
  if (s === 'idle') return 'idle';
  if (s === 'dnd') return 'dnd';
  return '';
}

function statusLabel(s) {
  if (s === 'online') return 'Online';
  if (s === 'idle') return 'Idle';
  if (s === 'dnd') return 'Do Not Disturb';
  return 'Offline';
}

async function fetchDiscord() {
  const content = document.getElementById('discord-content');
  const liveBadge = document.getElementById('discord-live-badge');

  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
    if (!res.ok) throw new Error();
    const json = await res.json();
    if (!json.success) throw new Error();
    const d = json.data;
    const u = d.discord_user;

    liveBadge.style.display = 'flex';

    const avatarUrl = u.avatar
      ? `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.webp?size=128`
      : null;

    const activity = d.activities?.find(a => a.type === 0 || a.type === 2);

    const activityHtml = activity ? `
      <div class="discord-activity">
        <div class="activity-icon">•</div>
        <div class="activity-body">
          <div class="activity-label">${activity.type === 2 ? 'Listening to' : 'Playing'}</div>
          <div class="activity-name">${activity.name}</div>
          ${activity.details ? `<div class="activity-detail">${activity.details}</div>` : ''}
          ${activity.state ? `<div class="activity-detail">${activity.state}</div>` : ''}
        </div>
      </div>` : '';

    const sc = statusClass(d.discord_status);
    content.innerHTML = `
      <div class="discord-user">
        <div class="discord-avatar-wrap">
          <div class="discord-avatar">
            ${avatarUrl ? `<img src="${avatarUrl}" alt="avatar"/>` : 'DW'}
          </div>
          <div class="status-dot ${sc}"></div>
        </div>
        <div class="discord-details">
          <div class="discord-name">${u.global_name || u.username}</div>
          <div class="discord-handle">@${u.username}</div>
          <div class="discord-status-pill ${sc}">${statusLabel(d.discord_status)}</div>
        </div>
      </div>
      ${activityHtml}
    `;

    setTimeout(fetchDiscord, 30000);

  } catch {
    liveBadge.style.display = 'none';
    content.innerHTML = `
      <div class="discord-user">
        <div class="discord-avatar-wrap">
          <div class="discord-avatar">DW</div>
          <div class="status-dot"></div>
        </div>
        <div class="discord-details">
          <div class="discord-name">Drowys</div>
          <div class="discord-handle">@drowyss</div>
          <div class="discord-status-pill">Offline</div>
        </div>
      </div>
      <div class="discord-fallback">
        Join <a href="https://discord.gg/lanyard" target="_blank">Lanyard</a> to display live status.
      </div>
    `;
    setTimeout(fetchDiscord, 60000);
  }
}
